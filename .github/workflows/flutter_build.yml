name: Build & Deploy Flutter Web

on:
  push:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # ⚡ Cache dependências
      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('encryption_playground/pubspec.lock') }}

      # 📦 Flutter fixo
      - name: Setup Flutter
        run: git clone https://github.com/flutter/flutter.git --depth 1 -b 3.41.7

      # 🔧 PATH
      - name: Set PATH
        run: echo "$PWD/flutter/bin" >> $GITHUB_PATH

      # 🔍 Debug
      - name: Flutter Doctor
        run: flutter doctor -v

      # 🌐 Web
      - name: Enable Web
        run: flutter config --enable-web

      - name: Precache Web
        run: flutter precache --web

      # 📦 Dependências
      - name: Install dependencies
        working-directory: encryption_playground
        run: flutter pub get

      # 🏗️ Build
      - name: Build Flutter Web
        working-directory: encryption_playground
        run: flutter build web --release

      # ✅ Verificação
      - name: Verify build
        run: |
          if [ ! -f encryption_playground/build/web/index.html ]; then
            echo "Erro: build não gerado"
            exit 1
          fi

      # 📄 Copiar config
      - name: Copy vercel.json
        run: cp vercel.json encryption_playground/build/web/

      # 📦 Instalar CLI
      - name: Install Vercel CLI
        run: npm install -g vercel

      # 🔗 Pull config da Vercel
      - name: Pull Vercel config
        run: |
          cd encryption_playground/build/web
          vercel pull --yes \
            --environment=production \
            --token=${{ secrets.VERCEL_TOKEN }}

      # 🚀 Deploy (FORMA CORRETA)
      - name: Deploy to Vercel
        run: |
          cd encryption_playground/build/web
          vercel deploy --prebuilt \
            --prod \
            --token=${{ secrets.VERCEL_TOKEN }}
