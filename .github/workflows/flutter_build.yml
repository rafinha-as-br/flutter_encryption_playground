name: Build & Deploy Flutter Web

on:
  push:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout do código
      - name: Checkout
        uses: actions/checkout@v4

      # ⚡ Cache apenas dependências (seguro)
      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('encryption_playground/pubspec.lock') }}

      # 📦 Instala Flutter (versão fixa)
      - name: Setup Flutter
        run: |
          git clone https://github.com/flutter/flutter.git --depth 1 -b 3.41.7

      # 🔧 PATH
      - name: Set PATH
        run: echo "$PWD/flutter/bin" >> $GITHUB_PATH

      # 🔍 Diagnóstico
      - name: Flutter Doctor
        run: flutter doctor -v

      # 🌐 Web enable
      - name: Enable Web
        run: flutter config --enable-web

      # 📥 Baixar artefatos web
      - name: Precache Web
        run: flutter precache --web

      # 📦 Dependências
      - name: Install dependencies
        working-directory: encryption_playground
        run: flutter pub get

      # 🏗️ Build
      - name: Build Flutter Web
        working-directory: encryption_playground
        run: flutter build web --release

      # ✅ Garantir que build existe
      - name: Verify build output
        run: |
          if [ ! -f encryption_playground/build/web/index.html ]; then
            echo "Erro: build/web não foi gerado corretamente"
            exit 1
          fi

      # 📄 Copiar vercel.json para o build
      - name: Copy Vercel config
        run: cp vercel.json encryption_playground/build/web/

      # 🔗 Linkar projeto Vercel (ESSENCIAL)
      - name: Link Vercel Project
        run: |
          cd encryption_playground/build/web
          vercel link --yes \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --scope=${{ secrets.VERCEL_ORG_ID }} \
            --project=${{ secrets.VERCEL_PROJECT_ID }}

      # 🚀 Deploy
      - name: Deploy to Vercel
        run: |
          cd encryption_playground/build/web
          vercel --prod \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --scope=${{ secrets.VERCEL_ORG_ID }} \
            --yes
