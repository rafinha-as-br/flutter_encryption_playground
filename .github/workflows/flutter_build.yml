name: Build & Deploy Flutter Web

on:
  push:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Flutter
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            flutter
          key: flutter-${{ runner.os }}-${{ hashFiles('encryption_playground/pubspec.lock') }}

      - name: Clone Flutter
        run: |
          git clone https://github.com/flutter/flutter.git --depth 1 -b 3.41.7

      - name: Set PATH
        run: echo "$PWD/flutter/bin" >> $GITHUB_PATH

      - name: Enable Web
        run: flutter config --enable-web

      - name: Install dependencies
        working-directory: encryption_playground
        run: flutter pub get

      - name: Build Flutter Web
        working-directory: encryption_playground
        run: flutter build web --release

      - name: Copy Vercel config
        run: cp vercel.json encryption_playground/build/web/

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        run: vercel encryption_playground/build/web --prod --token=${{ secrets.VERCEL_TOKEN }} --confirm
