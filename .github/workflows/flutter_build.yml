name: Build & Deploy Flutter Web

on:
  push:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # ⚡ Cache apenas dependências (NÃO o Flutter)
      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('encryption_playground/pubspec.lock') }}

      # 📦 Instalar Flutter (versão fixa)
      - name: Setup Flutter
        run: |
          git clone https://github.com/flutter/flutter.git --depth 1 -b 3.41.7

      # 🔧 PATH
      - name: Set PATH
        run: echo "$PWD/flutter/bin" >> $GITHUB_PATH

      # 🔍 Diagnóstico (IMPORTANTE)
      - name: Flutter Doctor
        run: flutter doctor -v

      # 🌐 Habilitar Web
      - name: Enable Web
        run: flutter config --enable-web

      # 📥 Baixar artefatos web
      - name: Precache Web
        run: flutter precache --web

      # 📦 Dependências
      - name: Install dependencies
        working-directory: encryption_playground
        run: flutter pub get

      # 🏗️ Build
      - name: Build Flutter Web
        working-directory: encryption_playground
        run: flutter build web --release

      # ✅ Verificação crítica
      - name: Verify build output
        run: |
          if [ ! -f encryption_playground/build/web/index.html ]; then
            echo "Build web falhou: index.html não encontrado"
            exit 1
          fi

      # 📄 Copiar config da Vercel
      - name: Copy Vercel config
        run: cp vercel.json encryption_playground/build/web/

      # 🚀 Instalar CLI
      - name: Install Vercel CLI
        run: npm install -g vercel

      # 🚀 Deploy
      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      
      - name: Deploy Project
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
